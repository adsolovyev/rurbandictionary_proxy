server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://rurbandictionary-back.onrender.com;
        proxy_ssl_server_name on;               # включает SNI
        proxy_ssl_protocols TLSv1.2 TLSv1.3;   # явно указывает протоколы
        proxy_ssl_verify off;                  # временно отключает проверку сертификата (если самоподписанный или проблемы с цепочкой)
        
        proxy_set_header Host rurbandictionary-back.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}